<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>استعلام اللجنة</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
      padding: 40px;
    }

    .box {
      background: white;
      max-width: 400px;
      margin: auto;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 0 10px #ccc;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 15px 0;
      font-size: 16px;
      text-align: center;
    }

    button {
      width: 95%;
      padding: 12px;
      background: #2f6fed;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .card {
      margin-top: 20px;
      background: #eef4ff;
      padding: 15px;
      border-radius: 10px;
    }

    #result {
      margin-top: 20px;
      font-size: 17px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>استعلام بيانات اللجنة</h2>

    <input id="idNumber" type="text" placeholder="اكتب رقم الهوية">
    <button onclick="searchStudent()">بحث</button>

    <div id="result"></div>
  </div>

  <script>
    const API_URL = "ضعي_رابط_Apps_Script_هنا";

    function searchStudent() {
      const id = document.getElementById("idNumber").value.trim();
      const result = document.getElementById("result");

      if (!id) {
        result.innerHTML = "اكتبي رقم الهوية أولًا";
        return;
      }

      result.innerHTML = "جاري البحث...";

      fetch(`${API_URL}?id=${id}`)
        .then(response => response.json())
        .then(data => {
          if (data.found) {
            result.innerHTML = `
              <div class="card">
                <p><b>اسم الطالب:</b> ${data.name}</p>
                <p><b>رقم اللجنة:</b> ${data.committee}</p>
                <p><b>مقر اللجنة:</b> ${data.location}</p>
              </div>
            `;
          } else {
            result.innerHTML = "رقم الهوية غير موجود";
          }
        })
        .catch(() => {
          result.innerHTML = "صار خطأ، تأكدي من رابط Apps Script";
        });
    }
  </script>

</body>
</html>
