<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام الاستعلام عن اللجان</title>

<style>
body{font-family:Tahoma;background:#f5f7fb;margin:0}
header{background:#0f172a;color:#fff;padding:20px;text-align:center}
.container{max-width:1000px;margin:auto;padding:20px}
.card{background:#fff;padding:20px;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.1);margin-bottom:20px}
input{width:100%;padding:12px;border:1px solid #ccc;border-radius:10px;margin:8px 0}
button{background:#2563eb;color:#fff;border:none;padding:12px 18px;border-radius:10px;cursor:pointer}
button:hover{opacity:.9}
.hidden{display:none}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #ddd;text-align:right}
.danger{background:#dc2626}
</style>
</head>
<body>

<header>
<h1>نظام اللجان</h1>
<p>أدخل رقم الهوية لمعرفة رقم اللجنة ومقرها</p>
</header>

<div class="container">

<div class="card">
<h2>استعلام الطالب</h2>
<input id="searchId" placeholder="رقم الهوية">
<button onclick="searchStudent()">بحث</button>
<div id="result"></div>
</div>

<div class="card">
<h2>دخول الإدارة</h2>
<input id="adminPass" type="password" placeholder="كلمة المرور">
<button onclick="login()">دخول</button>
</div>

<div id="adminPanel" class="hidden card">
<h2>إدارة الطلاب</h2>

<input id="name" placeholder="اسم الطالب">
<input id="id" placeholder="رقم الهوية">
<input id="committee" placeholder="رقم اللجنة">
<input id="place" placeholder="مقر اللجنة">

<button onclick="saveStudent()">حفظ</button>

<table>
<thead>
<tr>
<th>الاسم</th>
<th>الهوية</th>
<th>اللجنة</th>
<th>المقر</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD3u6Aenlk_akT53hN8hfcsl1bFR1zVfXo",
  authDomain: "ggggg-7de8e.firebaseapp.com",
  projectId: "ggggg-7de8e",
  storageBucket: "ggggg-7de8e.firebasestorage.app",
  messagingSenderId: "1070467222108",
  appId: "1:1070467222108:web:347cea149f6b3d6e8ef499",
  measurementId: "G-DVZ0C36B6G"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const PASSWORD = "School@2026";

window.login = function(){
 const pass = document.getElementById("adminPass").value;
 if(pass===PASSWORD){
   document.getElementById("adminPanel").classList.remove("hidden");
   loadStudents();
 }else{
   alert("كلمة المرور غلط");
 }
}

window.saveStudent = async function(){
 const name=document.getElementById("name").value;
 const id=document.getElementById("id").value;
 const committee=document.getElementById("committee").value;
 const place=document.getElementById("place").value;

 if(!name || !id || !committee || !place){
  alert("عبي كل البيانات");
  return;
 }

 await addDoc(collection(db,"students"),{
   name,id,committee,place
 });

 alert("تم الحفظ");
 loadStudents();
}

window.searchStudent = async function(){
 const id=document.getElementById("searchId").value;
 const querySnapshot = await getDocs(collection(db, "students"));

 let found=false;
 querySnapshot.forEach((doc) => {
   const s=doc.data();

   if(s.id===id){
      found=true;
      document.getElementById("result").innerHTML=`
      <h3>تم العثور على البيانات</h3>
      <p>الاسم: ${s.name}</p>
      <p>رقم اللجنة: ${s.committee}</p>
      <p>المقر: ${s.place}</p>
      `;
   }
 });

 if(!found){
   document.getElementById("result").innerHTML="لا توجد بيانات";
 }
}

async function loadStudents(){
 const tbody=document.getElementById("table");
 tbody.innerHTML="";

 const querySnapshot = await getDocs(collection(db, "students"));

 querySnapshot.forEach((d) => {
   const s=d.data();

   tbody.innerHTML += `
   <tr>
   <td>${s.name}</td>
   <td>${s.id}</td>
   <td>${s.committee}</td>
   <td>${s.place}</td>
   <td><button class="danger" onclick="deleteStudent('${d.id}')">حذف</button></td>
   </tr>
   `;
 });
}

window.deleteStudent = async function(id){
 await deleteDoc(doc(db,"students",id));
 loadStudents();
}
</script>

</body>
</html>
